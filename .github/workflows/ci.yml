name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: seedling
          POSTGRES_PASSWORD: seedling
          POSTGRES_DB: seedling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mariadb:
        image: mariadb:11
        env:
          MARIADB_USER: seedling
          MARIADB_PASSWORD: seedling
          MARIADB_DATABASE: seedling_test
          MARIADB_ROOT_PASSWORD: rootpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install async DB drivers
        run: uv add asyncpg asyncmy --dev

      - name: Type check (mypy)
        run: uv run mypy seedling/

      - name: Tests (pytest)
        env:
          SEEDLING_TEST_PG_URL: postgresql+asyncpg://seedling:seedling@localhost:5432/seedling_test
          SEEDLING_TEST_MARIADB_URL: mysql+asyncmy://seedling:seedling@localhost:3306/seedling_test
        run: uv run pytest --cov=seedling --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install aiosqlite
        run: uv add aiosqlite --dev

      - name: Run create_batch benchmark
        run: uv run python benchmarks/bench_create_batch.py --json --rows 1000 > bench_create_batch.json

      - name: Run parallel benchmark
        run: uv run python benchmarks/bench_parallel.py --json > bench_parallel.json

      - name: Merge benchmark results
        run: |
          python -c "
          import json
          a = json.load(open('bench_create_batch.json'))
          b = json.load(open('bench_parallel.json'))
          print(json.dumps(a + b))
          " > benchmark_results.json

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: benchmark_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "130%"
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench
